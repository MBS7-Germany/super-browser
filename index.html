<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-ULTRA SYSTEM | CLOUD PC BROWSER</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0b; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; height: 100vh; display: flex; flex-direction: column; }
        .hero { padding: 100px 20px; flex: 1; }
        .btn { background: var(--neon); color: black; padding: 15px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-decoration: none; }
        #browser-ui { display: none; height: 100vh; flex-direction: column; width: 100%; }
        #nav-bar { background: #111; padding: 10px; display: flex; gap: 10px; align-items: center; }
        #url-input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid var(--neon); background: #000; color: var(--neon); outline: none; }
        iframe { flex: 1; border: none; background: white; width: 100%; }
        input[type="email"] { padding: 15px; width: 280px; border-radius: 5px; border: none; margin-bottom: 20px; outline: none; }
    </style>
</head>
<body>

<div id="landing">
    <div class="hero">
        <h1 style="color: var(--neon); font-size: 3rem; text-shadow: 0 0 10px var(--neon);">X-ULTRA CORE</h1>
        <p>Windows PC Performance auf deinem Xiaomi.</p>
        <input type="email" id="email" placeholder="Deine E-Mail Adresse..."><br>
        <button class="btn" onclick="checkAccess()">SYSTEM STARTEN</button>
        <p style="margin-top: 30px;">Noch kein Abo? <br>
           <a href="#" style="color: var(--neon); text-decoration: none; font-weight: bold;">[ JETZT MIT KRYPTO ODER STRIPE FREISCHALTEN ]</a>
        </p>
    </div>
</div>

<div id="browser-ui">
    <div id="nav-bar">
        <button class="btn" style="padding: 10px;" onclick="location.reload()">HOME</button>
        <input type="text" id="url-input" placeholder="URL eingeben (z.B. google.de)...">
        <button class="btn" style="padding: 10px;" onclick="surf()">SURFEN</button>
    </div>
    <iframe id="screen" name="viewport"></iframe>
</div>

<script>
    // Die harmonisierte Verbindung zu deinem Render-Server
    const RENDER_URL = "https://super-browser.onrender.com";

    async function checkAccess() {
        const emailInput = document.getElementById('email').value;
        if (!emailInput) {
            alert("Bitte E-Mail eingeben!");
            return;
        }

        try {
            // Test-Abfrage an deinen Server
            const response = await fetch(`${RENDER_URL}/tunnel?email=${encodeURIComponent(emailInput)}&url=https://bing.com`);
            
            if (response.ok) {
                document.getElementById('landing').style.display = 'none';
                document.getElementById('browser-ui').style.display = 'flex';
                // Startseite laden
                surf();
            } else {
                alert("Zugriff verweigert: Kein aktives Abo für diese E-Mail gefunden.");
            }
        } catch (error) {
            alert("Server-Verbindung wird aufgebaut... Bitte in 30 Sekunden nochmal versuchen (Render Free Sleep Mode).");
        }
    }

    function surf() {
        const email = document.getElementById('email').value;
        let targetUrl = document.getElementById('url-input').value || "https://bing.com";
        
        if (!targetUrl.startsWith('http')) {
            targetUrl = 'https://' + targetUrl;
        }

        // Der Tunnel-Befehl für den PC-Modus
        const finalUrl = `${RENDER_URL}/tunnel?email=${encodeURIComponent(email)}&url=${encodeURIComponent(targetUrl)}`;
        document.getElementById('screen').src = finalUrl;
    }
</script>
</body>
</html>
